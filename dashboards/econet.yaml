        show_header_toggle: false
        entities:
          - entity: sensor.grant_aerona_heat_pump_safe_mode
            name: Safe Mode
          - entity: sensor.grant_aerona_heat_pump_guardian_status
            name: Guardian
          - entity: sensor.grant_aerona_heat_pump_settings_version
