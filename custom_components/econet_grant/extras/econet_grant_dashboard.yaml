# ============================================================
# EcoNet Grant Aerona - Lovelace Dashboard
# ============================================================
# Deployment:
#   1. Copy this file to /homeassistant/dashboards/econet_grant_dashboard.yaml
#      (If installed via HACS, the file is already on your system at:
#       /homeassistant/custom_components/econet_grant/extras/econet_grant_dashboard.yaml)
#   2. Add the following to /homeassistant/configuration.yaml:
#
#        lovelace:
#          mode: storage
#          dashboards:
#            econet-grant:
#              mode: yaml
#              title: Grant Aerona Heat Pump
#              icon: mdi:heat-pump-outline
#              filename: dashboards/econet_grant_dashboard.yaml
#
#   3. Restart Home Assistant
#
# Prerequisites:
#   - econet_grant integration installed and configured
#   - HACS frontend cards installed: Mushroom, Mini Graph Card
#   - input_datetime.guest_checkout_date helper created
#   - input_boolean.guest_checkout_active helper created
#   - Optional: Grafana on port 3000 (replace <HA_IP> in iframe URLs)
# ============================================================

title: Grant Aerona Heat Pump
views:
  # -------------------------------------------------------
  # TAB 1: Favourites
  # -------------------------------------------------------
  - title: Favourites
    path: favourites
    icon: mdi:star
    cards:
      # --- Status indicators ---
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: select.grant_aerona_heat_pump_heat_pump_mode
            name: Heat Pump
            icon: mdi:heat-pump
            icon_color: green

          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_compressor_frequency
            name: Compressor
            icon: mdi:sine-wave
            icon_color: blue

          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_system_demand
            name: Demand
            icon: mdi:fire
            icon_color: orange

          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_fan_speed
            name: Fan Speed
            icon: mdi:fan
            icon_color: cyan

          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_pump_speed
            name: Pump Speed
            icon: mdi:pump
            icon_color: teal

          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_heat_source_preset_temp
            name: HP Target Temp
            icon: mdi:thermometer-high
            icon_color: deep-orange

      # --- Key temperatures ---
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_outdoor_temperature
            name: Outdoor Temp
            icon: mdi:weather-partly-cloudy
            icon_color: light-blue

          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_flow_temperature
            name: Flow Temp
            icon: mdi:thermometer-chevron-up
            icon_color: red

          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_return_temperature
            name: Return Temp
            icon: mdi:thermometer-chevron-down
            icon_color: indigo

      # --- CH and HW at a glance ---
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.grant_aerona_heat_pump_circuit_1_thermostat
            primary: >-
              CH: {{ states('sensor.grant_aerona_heat_pump_circuit_1_thermostat') }}°C
            secondary: >-
              Day set: {{ states('number.grant_aerona_heat_pump_circuit_1_comfort_temperature') }}°C
            icon: mdi:home-thermometer
            icon_color: orange

          - type: custom:mushroom-template-card
            entity: sensor.grant_aerona_heat_pump_dhw_temperature
            primary: >-
              HW: {{ states('sensor.grant_aerona_heat_pump_dhw_temperature') }}°C
            secondary: >-
              Set: {{ states('number.grant_aerona_heat_pump_dhw_set_point') }}°C
            icon: mdi:water-boiler
            icon_color: red

      # --- HW Recirculation ---
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: select.grant_aerona_heat_pump_dhw_recirculation_support
            name: HW Recirculation
            icon: mdi:water-sync
            icon_color: blue

          - type: custom:mushroom-entity-card
            entity: select.grant_aerona_heat_pump_work_mode
            name: Work Mode
            icon: mdi:sun-snowflake-variant
            icon_color: amber

          - type: custom:mushroom-entity-card
            entity: sensor.grant_aerona_heat_pump_weather_temperature
            name: Weather Temp
            icon: mdi:weather-cloudy
            icon_color: light-blue

      # --- Temperature history (24 h) ---
      - type: custom:mini-graph-card
        name: Temperature History (24h)
        entities:
          - entity: sensor.grant_aerona_heat_pump_outdoor_temperature
            name: Outdoor
            color: "#4FC3F7"
          - entity: sensor.grant_aerona_heat_pump_circuit_1_thermostat
            name: CH Actual
            color: "#FF7043"
          - entity: sensor.grant_aerona_heat_pump_dhw_temperature
            name: HW Tank
            color: "#66BB6A"
        hours_to_show: 24
        points_per_hour: 2
        line_width: 2
        show:
          labels: true
          legend: true

  # -------------------------------------------------------
  # TAB 2: Circuit 1 (Central Heating)
  # -------------------------------------------------------
  - title: Circuit 1
    path: circuit-1
    icon: mdi:radiator
    cards:
      # --- CH temperature history ---
      - type: custom:mini-graph-card
        name: CH Temperature History (24h)
        entities:
          - entity: sensor.grant_aerona_heat_pump_circuit_1_thermostat
            name: CH Actual
            color: "#FF7043"
          - entity: sensor.grant_aerona_heat_pump_flow_temperature
            name: Flow
            color: "#EF5350"
          - entity: sensor.grant_aerona_heat_pump_return_temperature
            name: Return
            color: "#42A5F5"
          - entity: sensor.grant_aerona_heat_pump_outdoor_temperature
            name: Outdoor
            color: "#4FC3F7"
        hours_to_show: 24
        points_per_hour: 2
        line_width: 2
        show:
          labels: true
          legend: true

      # --- Main controls ---
      - type: entities
        title: CH Controls
        entities:
          - entity: select.grant_aerona_heat_pump_circuit_1_operation_mode
            name: CH Operation Mode
          - entity: number.grant_aerona_heat_pump_circuit_1_comfort_temperature
            name: CH Day Temp
          - entity: number.grant_aerona_heat_pump_circuit_1_eco_temperature
            name: CH Night Temp
          - entity: number.grant_aerona_heat_pump_circuit_1_base_temperature
            name: CH Base Temp
          - entity: number.grant_aerona_heat_pump_ch_hysteresis
            name: CH Hysteresis
          - entity: number.grant_aerona_heat_pump_ch_boost_time
            name: CH Boost Time

      # --- Weather curve ---
      - type: entities
        title: Weather Curve
        entities:
          - entity: select.grant_aerona_heat_pump_heating_regulation_method
            name: CH Regulation Method
          - entity: number.grant_aerona_heat_pump_ch_curve
            name: CH Curve
          - entity: number.grant_aerona_heat_pump_ch_curve_shift
            name: CH Curve Shift
          - entity: number.grant_aerona_heat_pump_summer_mode_activation_temperature
            name: Summer Threshold
          - entity: number.grant_aerona_heat_pump_winter_mode_activation_temperature
            name: Winter Threshold

      # --- Advanced CH settings ---
      - type: entities
        title: CH Advanced
        entities:
          - entity: select.grant_aerona_heat_pump_heating_circuit_type
            name: CH Circuit Type
          - entity: select.grant_aerona_heat_pump_heating_thermostat_pump_blockade
            name: CH Pump Blockade
          - entity: number.grant_aerona_heat_pump_heating_temperature_correction
            name: Heating Temp Correction
          - entity: number.grant_aerona_heat_pump_setpoint_temperature_correction_cooling
            name: Cooling Setpoint Adj
          - entity: number.grant_aerona_heat_pump_heating_crit_temp_ignore_after_dhw
            name: Crit Temp Ignore After HW
          - entity: number.grant_aerona_heat_pump_panel_temp_correction
            name: Panel Temp Correction

  # -------------------------------------------------------
  # TAB 3: Hot Water (DHW)
  # -------------------------------------------------------
  - title: Hot Water
    path: hot-water
    icon: mdi:water-boiler
    cards:
      # --- HW temperature history ---
      - type: custom:mini-graph-card
        name: HW Temperature History (24h)
        entities:
          - entity: sensor.grant_aerona_heat_pump_dhw_temperature
            name: HW Actual
            color: "#EF5350"
        hours_to_show: 24
        points_per_hour: 2
        line_width: 2
        show:
          labels: true
          legend: true

      # --- Main controls ---
      - type: entities
        title: HW Controls
        entities:
          - entity: select.grant_aerona_heat_pump_hw_work_mode
            name: HW Work Mode
          - entity: select.grant_aerona_heat_pump_hw_boost
            name: HW Boost
          - entity: number.grant_aerona_heat_pump_dhw_set_point
            name: HW Set Point
          - entity: number.grant_aerona_heat_pump_hw_hysteresis
            name: HW Hysteresis
          - entity: number.grant_aerona_heat_pump_hw_extend_work
            name: HW Extend Work
          - entity: number.grant_aerona_heat_pump_dhw_correction_temperature
            name: HW Correction Temp

      # --- HW priority & support ---
      - type: entities
        title: HW Settings
        entities:
          - entity: select.grant_aerona_heat_pump_dhw_support
            name: HW Support
          - entity: select.grant_aerona_heat_pump_dhw_specify_priority
            name: HW Specify Priority
          - entity: select.grant_aerona_heat_pump_off_circuits_during_charging
            name: Off Circuits During HW
          - entity: select.grant_aerona_heat_pump_dhw_start_from_temp
            name: HW Start From Temp

      # --- Recirculation ---
      - type: entities
        title: HW Recirculation
        entities:
          - entity: select.grant_aerona_heat_pump_dhw_recirculation_support
            name: HW Recirc Support
          - entity: number.grant_aerona_heat_pump_dhw_pump_start_temp
            name: HW Pump Start Temp
          - entity: number.grant_aerona_heat_pump_dhw_recirculation_operation_time
            name: HW Recirc Run Time
          - entity: number.grant_aerona_heat_pump_dhw_recirculation_pause_time
            name: HW Recirc Pause

      # --- HW heater ---
      - type: entities
        title: HW Heater
        entities:
          - entity: select.grant_aerona_heat_pump_dhw_heater
            name: HW Heater
          - entity: number.grant_aerona_heat_pump_dhw_heater_delay
            name: HW Heater Delay

  # -------------------------------------------------------
  # TAB 4: System
  # -------------------------------------------------------
  - title: System
    path: system
    icon: mdi:cog
    cards:
      # --- Operating modes ---
      - type: entities
        title: Operating Modes
        entities:
          - entity: select.grant_aerona_heat_pump_heat_pump_mode
            name: Heat Pump Mode
          - entity: select.grant_aerona_heat_pump_work_mode
            name: Work Mode
          - entity: select.grant_aerona_heat_pump_hydraulic_scheme
            name: Hydraulic Scheme

      # --- System readings ---
      - type: entities
        title: System Readings
        entities:
          - entity: sensor.grant_aerona_heat_pump_compressor_frequency
            name: Compressor Frequency
          - entity: sensor.grant_aerona_heat_pump_pump_speed
            name: Pump Speed
          - entity: sensor.grant_aerona_heat_pump_fan_speed
            name: Fan Speed
          - entity: sensor.grant_aerona_heat_pump_system_demand
            name: System Demand
          - entity: sensor.grant_aerona_heat_pump_heat_source_preset_temp
            name: Heat Source Preset Temp
          - entity: sensor.grant_aerona_heat_pump_flow_temperature
            name: Flow Temperature
          - entity: sensor.grant_aerona_heat_pump_return_temperature
            name: Return Temperature
          - entity: sensor.grant_aerona_heat_pump_weather_temperature
            name: Weather Temperature
          - entity: sensor.grant_aerona_heat_pump_buffer_temperature_lower
            name: Buffer Temp (Lower)
          - entity: sensor.grant_aerona_heat_pump_heat_exchanger_temperature
            name: Heat Exchanger Temp

      # --- Sensor configuration ---
      - type: entities
        title: Sensor Configuration
        entities:
          - entity: select.grant_aerona_heat_pump_external_temperature_sensor_support
            name: Ext Temp Sensor
          - entity: select.grant_aerona_heat_pump_temperature_sensor_source
            name: Temp Sensor Source
          - entity: select.grant_aerona_heat_pump_cooling_support
            name: Cooling Support
          - entity: select.grant_aerona_heat_pump_heat_pump_lock
            name: Heat Pump Lock

      # --- Backup heater ---
      - type: entities
        title: Backup Heater
        entities:
          - entity: select.grant_aerona_heat_pump_backup_heater
            name: Backup Heater
          - entity: select.grant_aerona_heat_pump_backup_heater_operation_in_defrost
            name: Backup Htr in Defrost
          - entity: number.grant_aerona_heat_pump_outside_temp_start_heater
            name: Outside Temp Start Heater
          - entity: number.grant_aerona_heat_pump_outside_temp_force_heater
            name: Outside Temp Force Heater
          - entity: number.grant_aerona_heat_pump_backup_heater_delay
            name: Backup Heater Delay

      # --- Backup / Restore ---
      - type: horizontal-stack
        cards:
          - type: button
            name: Backup Settings
            icon: mdi:content-save
            tap_action:
              action: call-service
              service: econet_grant.backup_settings
              service_data:
                snapshot_name: "Default"

          - type: button
            name: Restore Defaults
            icon: mdi:backup-restore
            tap_action:
              action: call-service
              service: econet_grant.restore_settings
              service_data:
                snapshot_name: "Default"
            confirmation:
              text: "Restore all settings to the Default snapshot?"

      # Grafana iframe: replace <HA_IP> with your Home Assistant IP address
      - type: iframe
        title: System Graphs (Grafana)
        url: "http://<HA_IP>:3000/d/econet-system?orgId=1&kiosk=tv"
        aspect_ratio: 60%

  # -------------------------------------------------------
  # TAB 5: Guest
  # -------------------------------------------------------
  - title: Guest
    path: guest
    icon: mdi:account-clock
    cards:
      - type: entities
        title: Guest Checkout
        entities:
          - entity: input_datetime.guest_checkout_date
            name: Checkout Date
          - entity: input_boolean.guest_checkout_active
            name: Checkout Active

      - type: markdown
        title: Guest Checkout Info
        content: >
          **How it works:**

          1. Set the guest checkout date above (or via Alexa)

          2. At 10:00 AM on that date, all heat pump settings will be
             automatically restored to the "Default" snapshot

          3. You'll receive a notification when the restore happens

          **Alexa:** Create a routine that sets the checkout date.
          Say "Alexa, guest checkout is [date]".

      - type: horizontal-stack
        cards:
          - type: button
            name: Save Guest Mode
            icon: mdi:content-save-settings
            tap_action:
              action: call-service
              service: econet_grant.backup_settings
              service_data:
                snapshot_name: "Guest Mode"

          - type: button
            name: Restore Guest Mode
            icon: mdi:account-cog
            tap_action:
              action: call-service
              service: econet_grant.restore_settings
              service_data:
                snapshot_name: "Guest Mode"
            confirmation:
              text: "Restore settings to the Guest Mode snapshot?"

  # -------------------------------------------------------
  # TAB 6: Admin
  # -------------------------------------------------------
  - title: Admin
    path: admin
    icon: mdi:shield-lock
    cards:
      - type: entities
        title: Snapshot & Backup
        show_header_toggle: false
        entities:
          - entity: sensor.grant_aerona_heat_pump_last_default_snapshot
            name: Last Default Snapshot
            icon: mdi:content-save-check

      - type: horizontal-stack
        cards:
          - type: button
            name: Take Default Snapshot
            icon: mdi:content-save-all
            tap_action:
              action: call-service
              service: econet_grant.backup_settings
              service_data:
                snapshot_name: "Default"
            confirmation:
              text: "Save current settings as 'Default' snapshot?"

          - type: button
            name: Restore Default
            icon: mdi:backup-restore
            tap_action:
              action: call-service
              service: econet_grant.restore_settings
              service_data:
                snapshot_name: "Default"
            confirmation:
              text: "Restore all settings from the 'Default' snapshot?"

      - type: entities
        title: Integration Status
        show_header_toggle: false
        entities:
          - entity: sensor.grant_aerona_heat_pump_safe_mode
            name: Safe Mode
            icon: mdi:shield-lock
          - entity: sensor.grant_aerona_heat_pump_last_sensor_poll
            name: Last Sensor Poll
            icon: mdi:clock-check
          - entity: sensor.grant_aerona_heat_pump_last_settings_check
            name: Last Settings Check
            icon: mdi:clock-alert
          - entity: sensor.grant_aerona_heat_pump_settings_version
            name: Settings Version
            icon: mdi:counter
          - entity: sensor.grant_aerona_heat_pump_database_size
            name: Database Size
            icon: mdi:database
          - entity: sensor.grant_aerona_heat_pump_recent_changes_24h
            name: Changes (24h)
            icon: mdi:delta

      - type: conditional
        conditions:
          - entity: sensor.grant_aerona_heat_pump_remote_menu
            state: "true"
        card:
          type: markdown
          content: >
            ## WARNING: Remote Menu is ENABLED

            The ecoNET controller has `remoteMenu: true`. This was previously
            `false`. RM API endpoints may now be available. Investigate immediately
            -- this could indicate a firmware update or configuration change.

      - type: markdown
        title: Configuration
        content: >
          **To change integration settings** (safe mode, data retention):

          Settings > Devices & Services > EcoNet Grant Aerona > Configure


          **To view detailed logs:**

          Settings > System > Logs > filter by `econet_grant`

      - type: markdown
        title: About
        content: >
          **EcoNet Grant Aerona** v0.4.0

          Monitors and controls a Grant Aerona heat pump via the ecoNET local API.

          [Documentation](https://github.com/mac-wifi/Grant_Aerona_ecoNET_HomeAssistant_Tool)
